<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexura OS</title>
    <style>
        :root {
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --bg: #0a0a14;
            --glass: rgba(20,20,40,0.7);
            --glass2: rgba(30,30,55,0.75);
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --taskbar: rgba(16,16,32,0.8);
            --win-title: rgba(18,18,35,0.85);
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
            --radius: 14px;
            --font: 'Segoe UI', system-ui, sans-serif;
            --transition: 0.25s ease;
            --os-blur: 24px;
            --os-transparency: 0.75;
            --os-border-radius: 14px;
            --os-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:#000; overflow:hidden; height:100vh; width:100vw; user-select:none; color:var(--text); cursor:url('https://cdn.custom-cursor.com/packs/3686/starter-space-pack.png'), auto; }
        canvas#wallpaperCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        #bootScreen { position:fixed; inset:0; z-index:9999; background:#050510; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.8s; }
        #bootScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .boot-logo { width:90px; height:90px; border-radius:22px; background:linear-gradient(135deg,#6c5ce7,#a29bfe,#fd79a8); display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:900; color:#fff; animation:bootPulse 1.5s infinite; box-shadow:0 0 60px rgba(108,92,231,0.6); margin-bottom:20px; }
        @keyframes bootPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
        .boot-spinner { width:50px; height:50px; border:3px solid rgba(255,255,255,0.1); border-top-color:#a29bfe; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:16px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .boot-info { color:#888; font-size:13px; min-height:20px; }
        .boot-progress { width:220px; height:3px; background:rgba(255,255,255,0.08); border-radius:5px; margin-top:12px; overflow:hidden; }
        .boot-progress-bar { height:100%; background:linear-gradient(90deg,#6c5ce7,#a29bfe); border-radius:5px; width:0%; }

        /* Lock screen */
        #lockScreen {
            position:fixed; inset:0; z-index:8888;
            background: rgba(10,10,20,0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            transition:opacity 0.5s,transform 0.5s;
        }
        #lockScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; transform:translateY(-30px); }
        .lock-particles { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
        .lock-particle { position:absolute; border-radius:50%; background:var(--accent2); opacity:0.1; animation:floatLock 8s infinite ease-in-out; }
        @keyframes floatLock {
            0%{transform:translateY(0) translateX(0) scale(1); opacity:0.05;}
            50%{opacity:0.25; transform:translateY(-30px) translateX(10px) scale(1.4);}
            100%{transform:translateY(0) translateX(0) scale(1); opacity:0.05;}
        }
        .lock-container { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:16px; }
        .lock-avatar { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; box-shadow:0 0 30px rgba(108,92,231,0.5); }
        .lock-avatar-img { font-size:36px; font-weight:700; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.4); }
        .lock-brand { font-size:14px; letter-spacing:6px; text-transform:uppercase; color:var(--accent2); margin-bottom:4px; font-weight:300; }
        .lock-user { font-size:18px; color:#d0d0e0; margin-top:-8px; }
        .lock-time { font-size:88px; font-weight:200; color:#fff; text-shadow:0 0 60px rgba(162,155,254,0.5); line-height:1; }
        .lock-date { font-size:18px; color:#b0b0c8; margin-top:-8px; font-weight:300; }
        .lock-pin-container { display:flex; align-items:center; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); border-radius:14px; padding:6px 14px; gap:8px; margin-top:8px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
        .lock-icon { font-size:20px; color:var(--accent2); }
        .lock-pin-input { background:transparent; border:none; color:#fff; font-size:22px; text-align:center; width:140px; outline:none; letter-spacing:12px; font-family:monospace; }
        .lock-pin-input::placeholder { color:rgba(255,255,255,0.35); letter-spacing:4px; font-size:16px; font-family:var(--font); }
        .lock-error { color:#ff5f57; font-size:13px; min-height:20px; margin-top:-6px; }
        .lock-hint { font-size:12px; color:rgba(255,255,255,0.35); margin-top:-10px; }

        #desktop { position:fixed; inset:0; z-index:1; padding:50px 20px 60px; display:flex; flex-wrap:wrap; align-content:flex-start; gap:8px; flex-direction:column; }
        .desktop-icon { width:80px; height:90px; display:flex; flex-direction:column; align-items:center; cursor:pointer; padding:8px; border-radius:10px; transition:var(--transition); z-index:2; }
        .desktop-icon:hover { background:rgba(255,255,255,0.08); }
        .desktop-icon .icon-img { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:26px; margin-bottom:4px; }
        .desktop-icon .icon-label { font-size:11px; color:#e0e0f0; text-shadow:0 1px 4px rgba(0,0,0,0.7); }

        #taskbar { position:fixed; bottom:0; left:0; right:0; height:50px; z-index:8000; background:var(--taskbar); backdrop-filter:blur(30px); display:flex; align-items:center; justify-content:center; border-top:1px solid rgba(255,255,255,0.08); gap:4px; padding:0 12px; }
        .taskbar-item { height:38px; min-width:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; font-size:20px; padding:0 10px; gap:6px; color:#d0d0e0; background:transparent; border:none; }
        .taskbar-item:hover { background:rgba(255,255,255,0.1); }
        .taskbar-item.active { background:rgba(255,255,255,0.12); }
        .taskbar-item .indicator { position:absolute; bottom:2px; width:6px; height:3px; background:var(--accent2); border-radius:3px; }
        .taskbar-item.active .indicator { width:20px; background:var(--accent); }
        .taskbar-right { position:absolute; right:10px; display:flex; align-items:center; gap:6px; }
        .tb-time { font-size:11px; color:#c0c0d8; text-align:right; line-height:1.3; cursor:pointer; padding:4px 8px; border-radius:6px; }
        .tb-btn { width:34px; height:34px; border-radius:8px; background:transparent; border:none; color:#d0d0e0; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }

        #startMenu { position:fixed; bottom:60px; left:50%; transform:translateX(-50%) translateY(20px); z-index:8500; width:560px; max-width:95vw; background:var(--glass2); backdrop-filter:blur(40px); border-radius:16px; border:1px solid rgba(255,255,255,0.12); box-shadow:var(--shadow); padding:20px; display:flex; flex-direction:column; gap:16px; opacity:0; visibility:hidden; pointer-events:none; transition:0.3s ease; }
        #startMenu.open { opacity:1; visibility:visible; pointer-events:all; transform:translateX(-50%) translateY(0); }
        .start-search { width:100%; padding:10px 16px; border-radius:20px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06); color:#fff; font-size:14px; outline:none; }
        .start-pinned { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
        .start-pin-item { aspect-ratio:1; border-radius:12px; background:rgba(255,255,255,0.05); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-size:24px; gap:2px; border:1px solid transparent; }
        .start-pin-item:hover { background:rgba(255,255,255,0.12); }
        .start-pin-item span { font-size:10px; color:#c0c0d8; }
        .start-power { display:flex; gap:8px; justify-content:flex-end; }
        .start-power button { padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.04); color:#d0d0e0; cursor:pointer; font-size:12px; }
        .shutdown-btn { background:rgba(255,70,70,0.2); border-color:rgba(255,70,70,0.4); color:#ff6b6b; }

        .os-window { position:absolute; min-width:300px; min-height:200px; background:rgba(30,30,55,var(--os-transparency)); backdrop-filter:blur(var(--os-blur)); border-radius:var(--os-border-radius); border:1px solid rgba(255,255,255,0.15); box-shadow:var(--os-shadow); display:flex; flex-direction:column; z-index:100; overflow:hidden; animation:windowOpen 0.3s ease; }
        @keyframes windowOpen { from{opacity:0; transform:scale(0.9)} to{opacity:1; transform:scale(1)} }
        .os-window.maximized { top:0!important; left:0!important; width:100vw!important; height:calc(100vh - 50px)!important; border-radius:0!important; }
        .os-window.closing { animation:windowClose 0.25s ease forwards; }
        @keyframes windowClose { to{opacity:0; transform:scale(0.85)} }
        .win-titlebar { height:38px; background:var(--win-title); display:flex; align-items:center; padding:0 10px; cursor:grab; gap:8px; border-bottom:1px solid rgba(255,255,255,0.06); }
        .win-title { flex:1; font-size:12px; font-weight:500; color:#c8c8dc; text-align:center; }
        .win-btn { width:13px; height:13px; border-radius:50%; cursor:pointer; border:none; }
        .win-btn.close { background:#ff5f57; }
        .win-btn.minimize { background:#ffbd2e; }
        .win-btn.maximize { background:#28c840; }
        .win-btn:hover { filter:brightness(1.3); transform:scale(1.15); }
        .win-content { flex:1; overflow:auto; padding:16px; position:relative; }

        #notificationCenter { position:fixed; right:10px; top:60px; z-index:9000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:var(--glass2); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:12px 18px; color:#e0e0f0; font-size:13px; animation:toastIn 0.4s ease,toastOut 0.3s ease 2.5s forwards; pointer-events:all; box-shadow:var(--shadow); max-width:340px; }
        @keyframes toastIn { from{opacity:0; transform:translateX(60px)} to{opacity:1; transform:translateX(0)} }
        @keyframes toastOut { to{opacity:0; transform:translateX(60px)} }

        #quickSettings { position:fixed; right:10px; bottom:60px; z-index:8600; background:var(--glass2); backdrop-filter:blur(30px); border-radius:16px; border:1px solid rgba(255,255,255,0.12); padding:16px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; opacity:0; visibility:hidden; pointer-events:none; transition:0.3s ease; box-shadow:var(--shadow); transform:translateY(10px); }
        #quickSettings.open { opacity:1; visibility:visible; pointer-events:all; transform:translateY(0); }
        .qs-btn { width:60px; height:60px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#e0e0f0; cursor:pointer; font-size:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
        .qs-btn span { font-size:9px; }

        #contextMenu { position:fixed; z-index:9500; background:var(--glass2); border-radius:12px; border:1px solid rgba(255,255,255,0.15); padding:6px; min-width:180px; opacity:0; visibility:hidden; pointer-events:none; transition:opacity 0.15s; box-shadow:var(--shadow); }
        #contextMenu.open { opacity:1; visibility:visible; pointer-events:all; }
        .ctx-item { padding:9px 16px; cursor:pointer; border-radius:8px; font-size:13px; display:flex; align-items:center; gap:8px; color:#d0d0e0; }

        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:10px; }

        /* NEW: Styles for QuietQuest, Aura Lab Links, and AI Notes windows */
        .quietquest-iframe {
            width: 100%;
            height: 100%;
            min-height: 320px;
            border: 0;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
        }
        .auralab-link-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .auralab-link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 13px;
            transition: var(--transition);
        }
        .auralab-link-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent2);
            transform: translateX(3px);
        }
        .auralab-link-icon {
            font-size: 20px;
            width: 32px;
            text-align: center;
        }
        .ai-notes-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }
        .ai-notes-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
        }
        .ai-notes-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(108,92,231,0.25);
        }
        .ai-notes-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            align-self: flex-start;
        }
        .ai-notes-btn:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108,92,231,0.4);
        }
        .ai-notes-output {
            flex: 1;
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.25);
            color: #d0d0e8;
            font-size: 13px;
            font-family: var(--font);
            resize: none;
            outline: none;
            line-height: 1.6;
            min-height: 150px;
        }
    </style>
</head>
<body>
<div id="bootScreen"><div class="boot-logo">N</div><div class="boot-spinner"></div><div class="boot-info" id="bootInfo">Initializing...</div><div class="boot-progress"><div class="boot-progress-bar" id="bootProgressBar"></div></div></div>

<div id="lockScreen" class="hidden">
    <div class="lock-particles" id="lockParticles"></div>
    <div class="lock-container">
        <div class="lock-avatar"><div class="lock-avatar-img">NK</div></div>
        <div class="lock-brand">Nexura OS</div>
        <div class="lock-user" id="lockUserName">Welcome back</div>
        <div class="lock-time" id="lockTime">00:00</div>
        <div class="lock-date" id="lockDate">...</div>
        <div class="lock-pin-container">
            <span class="lock-icon">🔒</span>
            <input type="password" class="lock-pin-input" id="pinInput" placeholder="PIN" maxlength="6">
        </div>
        <div class="lock-error" id="lockError"></div>
        <div class="lock-hint">Press Enter to unlock</div>
    </div>
</div>

<div id="desktop"></div>
<canvas id="wallpaperCanvas"></canvas>

<div id="taskbar">
    <button class="taskbar-item" id="startBtn">🟣</button>
    <div style="flex:1;display:flex;gap:3px;justify-content:center;" id="taskbarApps"></div>
    <div class="taskbar-right">
        <button class="tb-btn" id="qsToggle">⚡</button>
        <div class="tb-time" id="taskbarTime">00:00<br><small>...</small></div>
    </div>
</div>

<div id="startMenu">
    <input class="start-search" placeholder="🔍 Search..." id="startSearch">
    <div class="start-pinned" id="startPinned"></div>
    <div class="start-power">
        <button onclick="NexuraOS.lock()">🔒 Lock</button>
        <button onclick="NexuraOS.restart()">🔄 Restart</button>
        <button class="shutdown-btn" onclick="NexuraOS.shutdown()">⏻ Shutdown</button>
    </div>
</div>

<div id="quickSettings">
    <button class="qs-btn" onclick="NexuraOS.toggleWiFi()">📶<span>WiFi</span></button>
    <button class="qs-btn" onclick="NexuraOS.toggleBluetooth()">🔵<span>BT</span></button>
    <button class="qs-btn" onclick="NexuraOS.toggleDarkMode()">🌓<span>Theme</span></button>
    <button class="qs-btn" onclick="NexuraOS.openApp('settings')">⚙️<span>Settings</span></button>
    <button class="qs-btn" onclick="NexuraOS.toggleFocus()">🎯<span>Focus</span></button>
    <button class="qs-btn" onclick="NexuraOS.showNotification('Nexura','All good!')">🔔<span>Info</span></button>
</div>

<div id="contextMenu"></div>
<div id="notificationCenter"></div>

<script>
const PRESET_BG = [
    'https://images.pexels.com/photos/2832382/pexels-photo-2832382.jpeg?auto=compress&cs=tinysrgb&w=1920',
    'https://images.pexels.com/photos/313782/pexels-photo-313782.jpeg?auto=compress&cs=tinysrgb&w=1920',
    'https://images.pexels.com/photos/2662116/pexels-photo-2662116.jpeg?auto=compress&cs=tinysrgb&w=1920',
    'https://images.pexels.com/photos/1084510/pexels-photo-1084510.jpeg?auto=compress&cs=tinysrgb&w=1920',
    'https://images.pexels.com/photos/1366919/pexels-photo-1366919.jpeg?auto=compress&cs=tinysrgb&w=1920',
    'https://images.pexels.com/photos/235986/pexels-photo-235986.jpeg?auto=compress&cs=tinysrgb&w=1920'
];

const APPS_RAW = `hcodx|HCODX|💻|https://hcodx.com/
playgama|Playgama|🎮|https://playgama.com/
sprunki_original|Sprunki – Playgama|🎵|https://playgama.com/game/sprunki-original-version
puter|Puter|💻|https://puter.com/
copy_sh_v86|copy.sh v86|💻|https://copy.sh/v86/
webos_js|OS.js Web Desktop|🌐|https://webos.js.org/
exaequos|exaequOS|💿|https://www.exaequos.com/start
infinitemac|InfiniteMac|🍏|https://infinitemac.org/
pcjs|PCjs|🖥️|https://www.pcjs.org/
prozillaos|ProzillaOS|💻|https://os.prozilla.dev/
aura_cares0|Aura Lab: Cares & Laughs 0|❤️|https://codepen.io/Kavyant-Kumar/pen/dPNzjGO
aura_cares_laughs2|Aura Lab: Cares & Laughs 2|❤️|https://codepen.io/Kavyant-Kumar/pen/dPOXwmY
aura_cares_laughs1|Aura Lab: Cares & Laughs 1|💛|https://codepen.io/Kavyant-Kumar/pen/dPGJPKj
instagram|Instagram|📸|https://instagram.com/kavyanthub
facebook|Facebook|👥|https://facebook.com/profile.php?id=61586003535719
github|GitHub|🐙|https://github.com/Kiik913
aura_discord|Aura Lab Server|🎮|https://discord.com/channels/1505857480503197696/1505857672597999736
youtube_channel|YouTube Channel|📺|https://www.youtube.com/@CareLabStudio
google_doodle_games|Popular Google Doodle Games|🎮|https://sites.google.com/site/populardoodlegames/home
bitwarden|Bitwarden|🔐|https://bitwarden.com
photopea|Photopea|🖼️|https://www.photopea.com/
wolframalpha|WolframAlpha|🧮|https://www.wolframalpha.com/
netflix_web|Netflix – Web|🎬|https://www.netflix.com/
epic_games_store|Epic Games Store|🎮|https://store.epicgames.com/
vscode|Visual Studio Code|💻|https://code.visualstudio.com/
tic_tac_toe|Tic Tac Toe|🎮|#game_ttt
color_picker|Color Picker|🎨|#app_colorpicker
tuner|Tuner|🎵|#app_tuner
roll_dice|Roll a Dice|🎲|#app_dice
meditate|Meditate|🧘|#app_meditate
metronome|Metronome|🎼|#app_metronome
flip_coin|Flip a Coin|🪙|#app_coin
spinner|Spinner|🎰|#app_spinner`;

function parseApps() {
    return APPS_RAW.trim().split('\n').map(l => {
        const p = l.split('|');
        return { id: p[0], name: p[1], icon: p[2], url: p[3] };
    });
}

(function() {
    const STORE_APPS = parseApps();
    const NexuraOS = {
        version: '24.0.0',
        build: '2026-NEX-024',
        isLocked: true,
        isBooted: false,
        windows: [],
        windowZIndex: 100,
        activeWindowId: null,
        pinnedApps: ['browser','files','terminal','calculator','settings','notes','music','paint','codeeditor','weather','store','games','quietquest','auralab_links','ai_notes'],
        wifiOn: true,
        bluetoothOn: true,
        darkMode: true,
        focusMode: false,
        wallpaperHue: 260,
        wallpaperType: 'gradient',
        backgroundImage: null,
        settingsStore: {
            blurAmount: 24,
            transparency: 75,
            borderRadius: 14,
            shadowIntensity: 40,
            iconSize: 48,
            showLabels: true,
            autoHide: false,
            taskbarTransparency: 80,
            lockBlur: 10
        },
        installedStoreApps: [],
        activeGames: {},
        userPIN: '1234',
        history: [],
        username: 'User',
        autoLockEnabled: false,
        lockTimeout: 300,
        showLockScreenOnStart: true,

        init() {
            this.loadSettings();
            this.setupBoot();
            this.setupWallpaper();
            this.setupDesktopIcons();
            this.setupStartMenu();
            this.setupTaskbarClock();
            this.setupEventListeners();
            this.setupContextMenu();
            document.getElementById('pinInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') this.checkPIN();
            });
            this.applySettings();
        },

        applySettings() {
            const s = this.settingsStore;
            document.documentElement.style.setProperty('--os-blur', s.blurAmount + 'px');
            document.documentElement.style.setProperty('--os-transparency', (s.transparency / 100).toFixed(2));
            document.documentElement.style.setProperty('--os-border-radius', s.borderRadius + 'px');
            document.documentElement.style.setProperty('--os-shadow', `0 8px ${s.shadowIntensity}px rgba(0,0,0,0.5)`);
            this.windows.forEach(w => {
                const el = document.getElementById(w.id);
                if (el) {
                    el.style.background = `rgba(30,30,55,${(s.transparency/100).toFixed(2)})`;
                    el.style.backdropFilter = `blur(${s.blurAmount}px)`;
                    el.style.borderRadius = s.borderRadius + 'px';
                    el.style.boxShadow = `0 8px ${s.shadowIntensity}px rgba(0,0,0,0.5)`;
                }
            });
            const tb = document.getElementById('taskbar');
            if (tb) {
                tb.style.background = s.autoHide ? 'transparent' : `rgba(16,16,32,${(s.taskbarTransparency/100).toFixed(2)})`;
                tb.style.height = s.autoHide ? '0px' : '50px';
            }
            document.querySelectorAll('.desktop-icon').forEach(icon => {
                const img = icon.querySelector('.icon-img');
                if (img) {
                    img.style.width = s.iconSize + 'px';
                    img.style.height = s.iconSize + 'px';
                    img.style.fontSize = (s.iconSize * 0.54) + 'px';
                }
                const lbl = icon.querySelector('.icon-label');
                if (lbl) lbl.style.display = s.showLabels ? 'block' : 'none';
            });
            this.setupWallpaper();
        },

        setupBoot() {
            const steps = ['Kernel...','Drivers...','Integrity...','Display...','Security...','Environment...','Services...','Desktop...','Welcome! ✨'];
            const bar = document.getElementById('bootProgressBar');
            const info = document.getElementById('bootInfo');
            let step = 0;
            const interval = setInterval(() => {
                if (step < steps.length) {
                    info.textContent = steps[step];
                    bar.style.width = ((step + 1) / steps.length * 100) + '%';
                    step++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('bootScreen').classList.add('hidden');
                        this.isBooted = true;
                        this.showLockScreen();
                    }, 600);
                }
            }, 300);
        },

        setupWallpaper() {
            const canvas = document.getElementById('wallpaperCanvas');
            const ctx = canvas.getContext('2d');
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.removeEventListener('resize', resize);
            window.addEventListener('resize', resize);
            const img = new Image();
            img.crossOrigin = 'anonymous';
            if (this.backgroundImage) img.src = this.backgroundImage;
            const draw = () => {
                if (img.complete && img.naturalWidth > 0 && this.backgroundImage) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                    const w = img.width * scale;
                    const h = img.height * scale;
                    const x = (canvas.width - w) / 2;
                    const y = (canvas.height - h) / 2;
                    ctx.drawImage(img, x, y, w, h);
                } else if (this.wallpaperType === 'gradient') {
                    const grad = ctx.createRadialGradient(
                        canvas.width * 0.3, canvas.height * 0.4, 50,
                        canvas.width * 0.7, canvas.height * 0.6, canvas.width * 0.9
                    );
                    grad.addColorStop(0, `hsl(${this.wallpaperHue},60%,18%)`);
                    grad.addColorStop(0.5, `hsl(${(this.wallpaperHue+40)%360},50%,10%)`);
                    grad.addColorStop(1, `hsl(${(this.wallpaperHue+80)%360},40%,4%)`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else if (this.wallpaperType === 'particles') {
                    ctx.fillStyle = '#0a0a14';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < 120; i++) {
                        const seed = i * 137.5;
                        const px = (seed * 31.7) % canvas.width;
                        const py = (seed * 73.1) % canvas.height;
                        ctx.fillStyle = `hsla(${this.wallpaperHue},70%,70%,${0.1 + 0.05 * Math.sin(Date.now()/3000 + i)})`;
                        ctx.beginPath();
                        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    ctx.fillStyle = `hsl(${this.wallpaperHue},30%,10%)`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                requestAnimationFrame(draw);
            };
            if (img.src) img.onload = () => requestAnimationFrame(draw);
            else requestAnimationFrame(draw);
        },

        showLockScreen() {
            const ls = document.getElementById('lockScreen');
            ls.classList.remove('hidden');
            this.isLocked = true;
            this.updateLockClock();
            clearInterval(this._lockClockInterval);
            this._lockClockInterval = setInterval(() => this.updateLockClock(), 1000);
            setTimeout(() => {
                const pin = document.getElementById('pinInput');
                if (pin) pin.focus();
            }, 100);
            this.spawnLockParticles();
            document.getElementById('lockError').textContent = '';
        },

        spawnLockParticles() {
            const container = document.getElementById('lockParticles');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'lock-particle';
                const size = Math.random() * 12 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 8 + 6) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        },

        updateLockClock() {
            const now = new Date();
            document.getElementById('lockTime').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('lockDate').textContent = now.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('taskbarTime').innerHTML =
                `${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}<br><small>${now.toLocaleDateString([], { day: 'numeric', month: 'short' })}</small>`;
        },

        checkPIN() {
            const pin = document.getElementById('pinInput').value;
            if (pin === this.userPIN) this.unlock();
            else document.getElementById('lockError').textContent = 'Incorrect PIN';
        },

        unlock() {
            if (!this.isLocked) return;
            document.getElementById('lockScreen').classList.add('hidden');
            this.isLocked = false;
            clearInterval(this._lockClockInterval);
            this.showDesktop();
            document.getElementById('desktop').style.display = 'flex';
        },

        lock() {
            if (this.isLocked) return;
            this.isLocked = true;
            this.closeAllWindows();
            document.getElementById('desktop').style.display = 'none';
            this.showLockScreen();
        },

        restart() {
            this.closeAllWindows();
            document.getElementById('desktop').style.display = 'none';
            document.getElementById('bootScreen').classList.remove('hidden');
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('bootProgressBar').style.width = '0%';
            this.isBooted = false;
            this.isLocked = true;
            setTimeout(() => this.setupBoot(), 400);
        },

        shutdown() {
            document.body.style.transition = 'opacity 0.8s';
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-size:24px;background:#000;">Nexura OS shut down.</div>';
                document.body.style.opacity = '1';
            }, 800);
        },

        showDesktop() {
            document.getElementById('desktop').style.display = 'flex';
            this.renderDesktopIcons();
        },

        setupDesktopIcons() {
            this.desktopIcons = [
                { id: 'browser', name: 'Aura Browser', icon: '🌐', color: '#3498db' },
                { id: 'files', name: 'Files', icon: '📁', color: '#f39c12' },
                { id: 'terminal', name: 'Terminal', icon: '⬛', color: '#2d3436' },
                { id: 'calculator', name: 'Calculator', icon: '🔢', color: '#636e72' },
                { id: 'settings', name: 'Settings', icon: '⚙️', color: '#7f8c8d' },
                { id: 'notes', name: 'Notes', icon: '📝', color: '#fdcb6e' },
                { id: 'music', name: 'Music', icon: '🎵', color: '#e84393' },
                { id: 'store', name: 'App Store', icon: '🛍️', color: '#00cec9' },
                { id: 'games', name: 'Games', icon: '🎮', color: '#e74c3c' },
                { id: 'paint', name: 'Nexura Paint', icon: '🎨', color: '#fd79a8' },
                { id: 'codeeditor', name: 'Code Editor', icon: '💻', color: '#6c5ce7' },
                { id: 'weather', name: 'Weather', icon: '🌤️', color: '#74b9ff' },
                // NEW: QuietQuest window icon
                { id: 'quietquest', name: 'Calm Focus – QuietQuest', icon: '🧘', color: '#4ecdc4' },
                // NEW: Aura Lab Links window icon
                { id: 'auralab_links', name: 'Aura Lab Links', icon: '🔗', color: '#ff6b6b' },
                // NEW: AI Notes (Simulated) window icon
                { id: 'ai_notes', name: 'AI Notes (Simulated)', icon: '🤖', color: '#a29bfe' }
            ];
        },

        renderDesktopIcons() {
            const d = document.getElementById('desktop');
            d.innerHTML = '';
            const all = [...this.desktopIcons];
            const storeMap = {};
            STORE_APPS.forEach(a => storeMap[a.id] = a.name);
            this.installedStoreApps.forEach(id => {
                all.push({ id, name: storeMap[id] || id, icon: '📦', color: '#555' });
            });
            all.forEach(a => {
                const div = document.createElement('div');
                div.className = 'desktop-icon';
                div.innerHTML = `<div class="icon-img" style="background:${a.color};color:#fff;">${a.icon}</div><div class="icon-label">${a.name}</div>`;
                div.addEventListener('dblclick', () => this.openApp(a.id));
                div.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    if (a.icon === '📦' && this.installedStoreApps.includes(a.id)) {
                        this.uninstallStoreApp(a.id);
                        this.showNotification('Store', `${a.name} uninstalled`);
                    }
                });
                d.appendChild(div);
            });
        },

        setupStartMenu() {
            const pc = document.getElementById('startPinned');
            pc.innerHTML = '';
            this.pinnedApps.forEach(id => {
                const a = this.desktopIcons.find(d => d.id === id) || { id, name: id, icon: '📦', color: '#555' };
                const div = document.createElement('div');
                div.className = 'start-pin-item';
                div.innerHTML = `${a.icon}<span>${a.name}</span>`;
                div.addEventListener('click', () => {
                    this.openApp(id);
                    this.toggleStartMenu(false);
                });
                pc.appendChild(div);
            });
        },

        toggleStartMenu(f) {
            const m = document.getElementById('startMenu');
            const o = typeof f === 'boolean' ? f : !m.classList.contains('open');
            if (o) {
                m.classList.add('open');
                document.getElementById('quickSettings').classList.remove('open');
            } else {
                m.classList.remove('open');
            }
        },

        openApp(id) {
            if (this.isLocked) return;
            const ew = this.windows.find(w => w.appId === id && !w.minimized);
            if (ew) {
                this.focusWindow(ew.id);
                return;
            }
            const app = this.getAppDefinition(id);
            if (!app) return;
            const wid = 'w' + Date.now();
            const w = {
                id: wid,
                appId: id,
                title: app.title,
                icon: app.icon,
                x: 80 + Math.random() * 200,
                y: 50 + Math.random() * 100,
                width: app.defaultWidth || 700,
                height: app.defaultHeight || 480,
                minimized: false,
                maximized: false,
                zIndex: ++this.windowZIndex
            };
            this.windows.push(w);
            this.renderWindow(w);
            this.updateTaskbar();
            this.focusWindow(wid);
            if (app.onOpen) app.onOpen(w);
        },

        getAppDefinition(id) {
            const defs = {
                browser: { title: 'Aura Browser', icon: '🌐', defaultWidth: 900, defaultHeight: 600, onOpen: w => this.setupBrowserApp(w) },
                files: { title: 'Files', icon: '📁', defaultWidth: 750, defaultHeight: 500, onOpen: w => this.setupFilesApp(w) },
                terminal: { title: 'Terminal', icon: '⬛', defaultWidth: 650, defaultHeight: 420, onOpen: w => this.setupTerminalApp(w) },
                calculator: { title: 'Calculator', icon: '🔢', defaultWidth: 320, defaultHeight: 420, onOpen: w => this.setupCalculatorApp(w) },
                settings: { title: 'Settings', icon: '⚙️', defaultWidth: 800, defaultHeight: 550, onOpen: w => this.setupSettingsApp(w) },
                notes: { title: 'Notes', icon: '📝', defaultWidth: 400, defaultHeight: 400, onOpen: w => this.setupNotesApp(w) },
                music: { title: 'Music', icon: '🎵', defaultWidth: 600, defaultHeight: 450, onOpen: w => this.setupMusicApp(w) },
                paint: { title: 'Nexura Paint', icon: '🎨', defaultWidth: 750, defaultHeight: 500, onOpen: w => this.setupPaintApp(w) },
                codeeditor: { title: 'Code Editor', icon: '💻', defaultWidth: 700, defaultHeight: 500, onOpen: w => this.setupCodeEditorApp(w) },
                weather: { title: 'Weather', icon: '🌤️', defaultWidth: 400, defaultHeight: 450, onOpen: w => this.setupWeatherApp(w) },
                store: { title: 'App Store', icon: '🛍️', defaultWidth: 800, defaultHeight: 550, onOpen: w => this.setupStoreApp(w) },
                games: { title: 'Game Launcher', icon: '🎮', defaultWidth: 650, defaultHeight: 480, onOpen: w => this.setupGamesApp(w) },
                tic_tac_toe: { title: 'Tic Tac Toe', icon: '🎮', defaultWidth: 350, defaultHeight: 400, onOpen: w => this.setupTicTacToe(w) },
                color_picker: { title: 'Color Picker', icon: '🎨', defaultWidth: 350, defaultHeight: 300, onOpen: w => this.setupColorPicker(w) },
                tuner: { title: 'Tuner', icon: '🎵', defaultWidth: 350, defaultHeight: 200, onOpen: w => this.setupTuner(w) },
                roll_dice: { title: 'Roll a Dice', icon: '🎲', defaultWidth: 300, defaultHeight: 250, onOpen: w => this.setupDice(w) },
                meditate: { title: 'Meditate', icon: '🧘', defaultWidth: 350, defaultHeight: 250, onOpen: w => this.setupMeditate(w) },
                metronome: { title: 'Metronome', icon: '🎼', defaultWidth: 350, defaultHeight: 200, onOpen: w => this.setupMetronome(w) },
                flip_coin: { title: 'Flip a Coin', icon: '🪙', defaultWidth: 300, defaultHeight: 250, onOpen: w => this.setupCoinFlip(w) },
                spinner: { title: 'Spinner', icon: '🎰', defaultWidth: 350, defaultHeight: 300, onOpen: w => this.setupSpinner(w) },
                // NEW: QuietQuest window definition
                quietquest: { title: 'Calm Focus – QuietQuest', icon: '🧘', defaultWidth: 800, defaultHeight: 520, onOpen: w => this.setupQuietQuestWindow(w) },
                // NEW: Aura Lab Links window definition
                auralab_links: { title: 'Aura Lab Links', icon: '🔗', defaultWidth: 480, defaultHeight: 460, onOpen: w => this.setupAuraLabLinksWindow(w) },
                // NEW: AI Notes (Simulated) window definition
                ai_notes: { title: 'AI Notes (Simulated)', icon: '🤖', defaultWidth: 520, defaultHeight: 480, onOpen: w => this.setupAINotesWindow(w) }
            };
            if (defs[id]) return defs[id];
            const storeApp = STORE_APPS.find(a => a.id === id);
            const title = storeApp ? storeApp.name : id;
            return { title, icon: '📦', defaultWidth: 600, defaultHeight: 400, onOpen: w => this.setupGenericApp(w, id) };
        },

        renderWindow(w) {
            const ex = document.getElementById(w.id);
            if (ex) ex.remove();
            const el = document.createElement('div');
            el.className = 'os-window';
            el.id = w.id;
            el.style.left = w.x + 'px';
            el.style.top = w.y + 'px';
            el.style.width = w.width + 'px';
            el.style.height = w.height + 'px';
            el.style.zIndex = w.zIndex;
            if (w.maximized) el.classList.add('maximized');
            el.innerHTML = `<div class="win-titlebar"><button class="win-btn close" data-action="close"></button><button class="win-btn minimize" data-action="minimize"></button><button class="win-btn maximize" data-action="maximize"></button><span class="win-title">${w.icon} ${w.title}</span></div><div class="win-content" id="content_${w.id}"></div>`;
            document.body.appendChild(el);
            el.querySelector('.win-btn.close').addEventListener('click', () => this.closeWindow(w.id));
            el.querySelector('.win-btn.minimize').addEventListener('click', () => this.minimizeWindow(w.id));
            el.querySelector('.win-btn.maximize').addEventListener('click', () => this.maximizeWindow(w.id));
            let dragData = null;
            el.querySelector('.win-titlebar').addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('win-btn') || w.maximized) return;
                dragData = { sx: e.clientX, sy: e.clientY, sl: w.x, st: w.y, wid: w.id };
                this.focusWindow(w.id);
            });
            document.addEventListener('mousemove', (e) => {
                if (!dragData || dragData.wid !== w.id) return;
                w.x = Math.max(-100, dragData.sl + (e.clientX - dragData.sx));
                w.y = Math.max(0, dragData.st + (e.clientY - dragData.sy));
                el.style.left = w.x + 'px';
                el.style.top = w.y + 'px';
            });
            document.addEventListener('mouseup', () => { dragData = null; });
        },

        focusWindow(id) {
            const w = this.windows.find(w => w.id === id);
            if (!w) return;
            w.zIndex = ++this.windowZIndex;
            const el = document.getElementById(id);
            if (el) el.style.zIndex = w.zIndex;
            this.activeWindowId = id;
            this.updateTaskbar();
        },

        minimizeWindow(id) {
            const w = this.windows.find(w => w.id === id);
            if (!w) return;
            w.minimized = true;
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
            this.updateTaskbar();
        },

        restoreWindow(id) {
            const w = this.windows.find(w => w.id === id);
            if (!w) return;
            w.minimized = false;
            const el = document.getElementById(id);
            if (el) el.style.display = 'flex';
            this.focusWindow(id);
        },

        maximizeWindow(id) {
            const w = this.windows.find(w => w.id === id);
            const el = document.getElementById(id);
            if (!el) return;
            w.maximized = !w.maximized;
            if (w.maximized) el.classList.add('maximized');
            else el.classList.remove('maximized');
        },

        closeWindow(id) {
            const w = this.windows.find(w => w.id === id);
            if (!w) return;
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('closing');
                setTimeout(() => el.remove(), 250);
            }
            this.windows = this.windows.filter(w => w.id !== id);
            this.updateTaskbar();
        },

        closeAllWindows() {
            [...this.windows].forEach(w => this.closeWindow(w.id));
        },

        updateTaskbar() {
            const c = document.getElementById('taskbarApps');
            c.innerHTML = '';
            this.windows.forEach(w => {
                const b = document.createElement('button');
                b.className = 'taskbar-item' + (w.id === this.activeWindowId ? ' active' : '');
                b.innerHTML = `${w.icon} <span>${w.title}</span><div class="indicator"></div>`;
                b.addEventListener('click', () => {
                    if (w.minimized) this.restoreWindow(w.id);
                    else this.minimizeWindow(w.id);
                });
                c.appendChild(b);
            });
        },

        setupTaskbarClock() {
            setInterval(() => this.updateLockClock(), 30000);
            this.updateLockClock();
        },

        setupEventListeners() {
            document.getElementById('startBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                this.toggleStartMenu();
            });
            document.getElementById('qsToggle').addEventListener('click', (e) => {
                e.stopPropagation();
                const q = document.getElementById('quickSettings');
                q.classList.toggle('open');
                document.getElementById('startMenu').classList.remove('open');
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#startMenu') && !e.target.closest('#startBtn'))
                    document.getElementById('startMenu').classList.remove('open');
                if (!e.target.closest('#quickSettings') && !e.target.closest('#qsToggle'))
                    document.getElementById('quickSettings').classList.remove('open');
                if (!e.target.closest('#contextMenu'))
                    document.getElementById('contextMenu').classList.remove('open');
            });
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                this.showContextMenu(e.clientX, e.clientY);
            });
        },

        setupContextMenu() {
            this.cm = [
                { label: '🔄 Refresh', action: () => { this.renderDesktopIcons(); } },
                { label: '🎨 Wallpaper', action: () => { this.wallpaperHue = Math.random() * 360; } },
                { label: '⚙️ Settings', action: () => this.openApp('settings') },
                { label: '🔒 Lock', action: () => this.lock() }
            ];
        },

        showContextMenu(x, y) {
            const m = document.getElementById('contextMenu');
            m.innerHTML = '';
            this.cm.forEach(i => {
                const d = document.createElement('div');
                d.className = 'ctx-item';
                d.textContent = i.label;
                d.addEventListener('click', () => {
                    i.action();
                    m.classList.remove('open');
                });
                m.appendChild(d);
            });
            m.style.left = Math.min(x, window.innerWidth - 200) + 'px';
            m.style.top = Math.min(y, window.innerHeight - 250) + 'px';
            m.classList.add('open');
        },

        showNotification(t, m) {
            const c = document.getElementById('notificationCenter');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<strong>${t}</strong><br>${m}`;
            c.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        },

        toggleWiFi() {
            this.wifiOn = !this.wifiOn;
            this.showNotification('WiFi', this.wifiOn ? 'Connected' : 'Disconnected');
        },

        toggleBluetooth() {
            this.bluetoothOn = !this.bluetoothOn;
            this.showNotification('Bluetooth', this.bluetoothOn ? 'Enabled' : 'Disabled');
        },

        toggleDarkMode() {
            this.darkMode = !this.darkMode;
            document.body.style.filter = this.darkMode ? 'none' : 'brightness(1.1)';
        },

        toggleFocus() {
            this.focusMode = !this.focusMode;
            this.showNotification('Focus', this.focusMode ? 'ON' : 'OFF');
        },

        loadSettings() {
            try {
                const s = JSON.parse(localStorage.getItem('ns'));
                if (s) {
                    this.wallpaperHue = s.h || 260;
                    this.darkMode = s.d !== false;
                    this.installedStoreApps = s.a || [];
                    this.userPIN = s.p || '1234';
                    this.backgroundImage = s.bg || null;
                    this.wallpaperType = s.wt || 'gradient';
                }
            } catch (e) {}
        },

        saveSettings() {
            try {
                localStorage.setItem('ns', JSON.stringify({
                    h: this.wallpaperHue,
                    d: this.darkMode,
                    a: this.installedStoreApps,
                    p: this.userPIN,
                    bg: this.backgroundImage,
                    wt: this.wallpaperType
                }));
            } catch (e) {}
        },

        installStoreApp(id) {
            if (!this.installedStoreApps.includes(id)) {
                this.installedStoreApps.push(id);
                this.saveSettings();
                this.renderDesktopIcons();
                this.showNotification('Store', `${id} installed`);
            }
        },

        uninstallStoreApp(id) {
            this.installedStoreApps = this.installedStoreApps.filter(i => i !== id);
            this.saveSettings();
            this.renderDesktopIcons();

            el.innerHTML = `<h3 style="text-align:center;">🎮 Tic Tac Toe</h3><div id="ttt_board_${w.id}" style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:200px;margin:10px auto;"></div><p id="ttt_status_${w.id}" style="text-align:center;margin-top:10px;"></p><button id="ttt_reset_${w.id}" style="display:block;margin:10px auto;padding:6px 20px;">Restart</button>`;
            let board = Array(9).fill('');
            let turn = 'X';
            let gameOver = false;
            const status = document.getElementById('ttt_status_' + w.id);
            const render = () => {
                const bd = document.getElementById('ttt_board_' + w.id);
                bd.innerHTML = '';
                board.forEach((v, i) => {
                    const cell = document.createElement('div');
                    cell.style.cssText = 'aspect-ratio:1;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;border-radius:6px;';
                    cell.textContent = v;
                    cell.addEventListener('click', () => {
                        if (gameOver || v) return;
                        board[i] = turn;
                        render();
                        if (checkWin()) {
                            status.textContent = turn + ' wins!';
                            gameOver = true;
                            return;
                        }
                        if (board.every(c => c)) {
                            status.textContent = 'Draw!';
                            gameOver = true;
                            return;
                        }
                        turn = turn === 'X' ? 'O' : 'X';
                        status.textContent = turn + "'s turn";
                    });
                    bd.appendChild(cell);
                });
            };
            const checkWin = () => {
                const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                return wins.some(w => board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]);
            };
            render();
            status.textContent = "X's turn";
            document.getElementById('ttt_reset_' + w.id).addEventListener('click', () => {
                board = Array(9).fill('');

            const apps = STORE_APPS;
            let tab = 'all';
            el.innerHTML = `<h3>🛍️ App Store</h3><div style="display:flex;gap:6px;margin-bottom:8px;"><button class="stb active" data-t="all">All</button><button class="stb" data-t="installed">Installed</button><button class="stb" data-t="uninstalled">Uninstalled</button></div><input id="ss_${w.id}" placeholder="Search..." style="width:100%;padding:6px;margin-bottom:8px;background:rgba(255,255,255,0.05);color:#fff;border-radius:6px;"><div id="sg_${w.id}" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;max-height:400px;overflow-y:auto;"></div>`;
            const grid = document.getElementById('sg_' + w.id);
            const search = document.getElementById('ss_' + w.id);
            const render = (f = '') => {
                const fl = apps.filter(a => {
                    const ms = a.name.toLowerCase().includes(f.toLowerCase());
                    const inst = this.installedStoreApps.includes(a.id);
                    if (tab === 'installed') return ms && inst;
                    if (tab === 'uninstalled') return ms && !inst;
                    return ms;
                });
                grid.innerHTML = fl.map(a => {
                    const inst = this.installedStoreApps.includes(a.id);
                    const isWebApp = a.url && !a.url.startsWith('#');
                    return `<div style="padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;text-align:center;cursor:${isWebApp ? 'pointer' : 'default'};" ${isWebApp ? `onclick="window.open('${a.url}','_blank')"` : ''}><div style="font-size:28px;">${a.icon}</div><b>${a.name}</b><br>${isWebApp ? `<button class="sib" data-id="${a.id}" style="padding:6px 12px;border-radius:6px;background:${inst ? 'rgba(255,70,70,0.3)' : 'rgba(108,92,231,0.3)'};color:#fff;border:none;margin-top:6px;">${inst ? 'Uninstall' : 'Install'}</button><br><a href="${a.url}" target="_blank" style="color:var(--accent2);font-size:11px;">Open ↗</a>` : `<small style="color:#888;">Built‑in app</small>`}</div>`;
                }).join('');
            };
            render();
            search.addEventListener('input', e => render(e.target.value));
            el.querySelectorAll('.stb').forEach(b => {
                b.addEventListener('click', () => {
                    tab = b.dataset.t;
                    el.querySelectorAll('.stb').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    render(search.value);
                });
            });
            grid.addEventListener('click', e => {
                if (e.target.classList.contains('sib')) {
                    e.stopPropagation();
                    const id = e.target.dataset.id;
                    if (this.installedStoreApps.includes(id)) this.uninstallStoreApp(id);
                    else this.installStoreApp(id);
                    render(search.value);
                }
            });
        },

        setupGenericApp(w, id) {
            const el = document.getElementById('content_' + w.id);
            if (!el) return;
            const storeApp = STORE_APPS.find(a => a.id === id);
            const name = storeApp ? storeApp.name : id;
            el.innerHTML = `<h3>${name}</h3><p>Installed from Store.</p>`;
        },

        setupGamesApp(w) {
            const el = document.getElementById('content_' + w.id);
            if (!el) return;
            el.innerHTML = `<h3>🎮 Game Launcher</h3><div style="display:flex;gap:6px;margin-bottom:8px;"><button data-g="snake">🐍 Snake</button><button data-g="pong">🏓 Pong</button></div><div id="ga_${w.id}"></div>`;
            el.querySelectorAll('button[data-g]').forEach(b => {
                b.addEventListener('click', () => {
                    const g = b.dataset.g;
                    if (this.activeGames[w.id]) {
                        this.activeGames[w.id].cleanup();
                        delete this.activeGames[w.id];
                    }
                    document.getElementById('ga_' + w.id).innerHTML = '';
                    if (g === 'snake') this.launchSnake(w.id);
                    else if (g === 'pong') this.launchPong(w.id);
                });
            });
        },

        launchSnake(wid) {
            const a = document.getElementById('ga_' + wid);
            a.innerHTML = `<div><span>🐍 Score: <span id="ss_${wid}">0</span></span><button id="rs_${wid}">🔄 Restart</button></div><canvas id="sc_${wid}" width="400" height="250" style="background:#0a0a14;"></canvas>`;
            const c = document.getElementById('sc_' + wid);
            const ctx = c.getContext('2d');
            const ss = document.getElementById('ss_' + wid);
            let snake = [{x:10,y:10}];
            let food = {x:15,y:15};
            let dir = {x:1,y:0};
            let score = 0;
            let go = false;
            let lt = 0;
            const loop = (ts) => {
                if (go) {
                    ctx.fillStyle = '#f55';
                    ctx.fillText('Game Over! '+score, 120, 125);
                    return;
                }
                if (ts - lt < 120) { requestAnimationFrame(loop); return; }
                lt = ts;
                const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
                if (h.x < 0 || h.x >= 40 || h.y < 0 || h.y >= 25 || snake.some(s => s.x === h.x && s.y === h.y)) {
                    go = true;
                    requestAnimationFrame(loop);
                    return;
                }
                snake.unshift(h);
                if (h.x === food.x && h.y === food.y) {
                    score++;
                    ss.textContent = score;
                    food = { x: Math.floor(Math.random() * 40), y: Math.floor(Math.random() * 25) };
                } else {
                    snake.pop();
                }
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, 400, 250);
                ctx.fillStyle = '#afa';
                snake.forEach(s => ctx.fillRect(s.x*10, s.y*10, 9, 9));
                ctx.fillStyle = '#f8a';
                ctx.fillRect(food.x*10, food.y*10, 9, 9);
                requestAnimationFrame(loop);
            };
            requestAnimationFrame(loop);
            const kh = (e) => {
                if (e.key === 'ArrowUp' && dir.y === 0) dir = {x:0, y:-1};
                if (e.key === 'ArrowDown' && dir.y === 0) dir = {x:0, y:1};
                if (e.key === 'ArrowLeft' && dir.x === 0) dir = {x:-1, y:0};
                if (e.key === 'ArrowRight' && dir.x === 0) dir = {x:1, y:0};
            };
            document.addEventListener('keydown', kh);
            document.getElementById('rs_' + wid).addEventListener('click', () => {
                document.removeEventListener('keydown', kh);
                this.launchSnake(wid);
            });
            this.activeGames[wid] = { cleanup: () => document.removeEventListener('keydown', kh) };
        },

        launchPong(wid) {
            const a = document.getElementById('ga_' + wid);
            a.innerHTML = `<div><span>🏓 Score: <span id="ps_${wid}">0</span></span><button id="rp_${wid}">🔄 Restart</button></div><canvas id="pc_${wid}" width="400" height="250" style="background:#0a0a14;"></canvas>`;
            const c = document.getElementById('pc_' + wid);
            const ctx = c.getContext('2d');
            const ss = document.getElementById('ps_' + wid);
            let py = 90;
            let ball = {x:200, y:125, vx:4, vy:3};
            let ay = 90;
            let score = 0;
            let go = false;
            const loop = () => {
                if (go) {
                    ctx.fillStyle = '#f55';
                    ctx.fillText('Game Over! '+score, 140, 125);
                    return;
                }
                ball.x += ball.vx;
                ball.y += ball.vy;
                if (ball.y <= 0 || ball.y >= 245) ball.vy *= -1;
                if (ball.x <= 20 && ball.y > py && ball.y < py + 60) {
                    ball.vx *= -1;
                    score++;
                    ss.textContent = score;
                }
                if (ball.x >= 385 && ball.y > ay && ball.y < ay + 60) ball.vx *= -1;
                if (ball.x < 0 || ball.x > 400) {
                    go = true;
                    requestAnimationFrame(loop);
                    return;
                }
                ay += (ball.y - (ay + 30)) * 0.1;
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, 400, 250);
                ctx.fillStyle = '#fff';
                ctx.fillRect(10, py, 8, 60);
                ctx.fillRect(385, ay, 8, 60);
                ctx.fillStyle = '#a9f';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
                ctx.fill();
                requestAnimationFrame(loop);
            };
            requestAnimationFrame(loop);
            const kh = (e) => {
                if (e.key === 'ArrowUp') py = Math.max(0, py - 15);
                if (e.key === 'ArrowDown') py = Math.min(190, py + 15);
            };
            document.addEventListener('keydown', kh);
            document.getElementById('rp_' + wid).addEventListener('click', () => {
                document.removeEventListener('keydown', kh);
                this.launchPong(wid);
            });
            this.activeGames[wid] = { cleanup: () => { document.removeEventListener('keydown', kh); } };
        },

        // ============ NEW: AI Notes (Simulated) Window ============
        setupAINotesWindow(w) {
            const el = document.getElementById('content_' + w.id);
            if (!el) return;
            el.innerHTML = `
                <div class="ai-notes-form">
                    <p style="font-size:13px;color:var(--text2);text-align:center;">
                        🤖 Simulated AI Notes – Study Helper
                    </p>
                    <label style="font-size:11px;color:var(--text2);">Video title or topic</label>
                    <input
                        type="text"
                        id="ai_input_${w.id}"
                        class="ai-notes-input"
                        placeholder="e.g. Deep Focus Music, Quantum Physics intro, or Coding focus routine..."
                    />
                    <button class="ai-notes-btn" id="ai_btn_${w.id}">
                        ✨ Generate notes (placeholder)
                    </button>
                    <label style="font-size:11px;color:var(--text2);">Generated notes</label>
                    <textarea
                        id="ai_output_${w.id}"
                        class="ai-notes-output"
                        readonly
                        placeholder="Your AI-style notes will appear here..."></textarea>
                </div>`;

            const generateNotes = (title) => {
                const t = title.toLowerCase().trim();
                if (!t) return 'Please enter a video title or topic to generate notes.';

                // Simulate AI-style notes based on keywords in the title
                let mainIdea = '';
                let useCases = '';
                let routine = '';
                let tips = '';

                if (t.includes('focus') || t.includes('concentrat') || t.includes('deep work')) {
                    mainIdea = 'This content helps you achieve a state of deep, uninterrupted focus for studying or creative work.';
                    useCases = '• Preparing for exams (JEE, NEET, board exams)\n• Coding sprints and project deep-dives\n• Writing, designing, or any creative flow state\n• Reading complex material that requires full attention';
                    routine = '1. Set a 25–45 minute focus block (Pomodoro style)\n2. Play the focus audio at moderate volume\n3. Remove phone notifications and external distractions\n4. Take a 5-minute break between blocks\n5. Repeat for 2–4 cycles for maximum productivity';
                    tips = '💡 Tip: Pair this with noise-cancelling headphones for best results.';
                } else if (t.includes('relax') || t.includes('calm') || t.includes('sleep') || t.includes('meditat')) {
                    mainIdea = 'This content is designed to help you unwind, reduce stress, and transition into a restful state.';
                    useCases = '• Pre-sleep wind-down routine\n• Stress relief after long study sessions\n• Background ambiance for gentle yoga or stretching\n• Mindfulness and meditation practice';
                    routine = '1. Find a comfortable position (lying down or seated)\n2. Close your eyes and breathe deeply for 2 minutes\n3. Let the audio guide you into a relaxed state\n4. Stay for at least 10–15 minutes\n5. Gently transition back to activity or sleep';
                    tips = '💡 Tip: Use this before bed to improve sleep quality and mental recovery.';
                } else if (t.includes('study') || t.includes('learn') || t.includes('physics') || t.includes('math') || t.includes('chemistry') || t.includes('jee') || t.includes('exam')) {
                    mainIdea = 'This content supports effective learning and retention for academic subjects and competitive exams.';
                    useCases = '• Active recall and spaced repetition sessions\n• Background focus while solving practice problems\n• Creating a consistent study atmosphere\n• Group study sessions (shared focus environment)';
                    routine = '1. Review key concepts for 10 minutes before starting\n2. Play the audio and begin focused problem-solving\n3. Use the Feynman technique: explain concepts out loud\n4. Take structured notes during breaks\n5. Review errors and weak areas after the session';
                    tips = '💡 Tip: Combine with handwritten notes for better memory retention.';
                } else if (t.includes('code') || t.includes('programming') || t.includes('developer') || t.includes('software')) {
                    mainIdea = 'This content provides an optimal audio environment for coding, debugging, and software development work.';
                    useCases = '• Feature development and coding sprints\n• Debugging complex issues (sustained focus)\n• Learning new programming languages or frameworks\n• Code reviews and documentation writing';
                    routine = '1. Define your coding goal for the session\n2. Start the audio and open your IDE/editor\n3. Work in 45-minute focused blocks\n4. Commit code or save progress at each break\n5. Review what you built at the end of the session';
                    tips = '💡 Tip: Use a second monitor for documentation/reference to stay in flow.';
                } else {
                    mainIdea = `This content explores the topic of "${title}" and provides a structured approach to understanding and applying the key concepts.`;
                    useCases = '• Self-paced learning and exploration\n• Supplementing formal education or courses\n• Building foundational knowledge in this area\n• Practical application of core principles';
                    routine = '1. Preview the topic: skim headings and key points\n2. Engage with the content actively (take notes)\n3. Pause and summarize each major section\n4. Create a mind map or summary after the session\n5. Review your notes within 24 hours for better retention';
                    tips = '💡 Tip: Teach what you learned to someone else – it reinforces understanding.';
                }

                return `📌 Main Idea:\n${mainIdea}\n\n📋 Use Cases:\n${useCases}\n\n🕐 Recommended Routine:\n${routine}\n\n${tips}\n\n━━━━━━━━━━━━━━━━━━━━\n📝 Generated on: ${new Date().toLocaleString()}\n🔹 Source: Nexura OS Simulated AI Notes\n🔹 This is a placeholder – no external AI API is used.`;
            };

            document.getElementById('ai_btn_' + w.id).addEventListener('click', () => {
                const input = document.getElementById('ai_input_' + w.id);
                const output = document.getElementById('ai_output_' + w.id);
                const title = input.value.trim();
                output.value = 'Generating... ✨';
                // Simulate a short "thinking" delay for realism
                setTimeout(() => {
                    output.value = generateNotes(title);
                }, 600 + Math.random() * 800);
            });

            // Allow Enter key to trigger generation
            document.getElementById('ai_input_' + w.id).addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('ai_btn_' + w.id).click();
                }
            });
        }
    };

    window.NexuraOS = NexuraOS;
    document.addEventListener('DOMContentLoaded', () => {
        NexuraOS.init();
        document.getElementById('desktop').style.display = 'none';
    });
})();
